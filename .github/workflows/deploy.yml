name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}

      - name: Add Ava Desktop release downloads
        env:
          GH_TOKEN: ${{ secrets.DESKTOP_RELEASE_TOKEN || github.token }}
        run: |
          mkdir -p out/downloads
          gh release download v1.2.4 --repo stayelles/ava-desktop-releases --pattern 'Ava-1.2.4-arm64.dmg' --dir out/downloads --clobber
          gh release download v1.2.4 --repo stayelles/ava-desktop-releases --pattern 'Ava-1.2.4-x64.dmg' --dir out/downloads --clobber
          gh release download v1.2.4 --repo stayelles/ava-desktop-releases --pattern 'AvaSetup-1.2.4.exe' --dir out/downloads --clobber
          gh release download v1.2.4 --repo stayelles/ava-desktop-releases --pattern 'AvaBridgeEA-1.34.ex5' --dir out/downloads --clobber

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          dangerous-clean-slate: false
          timeout: 900000
          exclude: |
            **/.git*
            **/.git*/**
